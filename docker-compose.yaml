version: '3.8'

services:
  # Redis - Cart Storage
  redis-cart:
    image: redis:7.2-alpine
    container_name: redis-cart
    ports:
      - "6379:6379"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ad Service - Java/gRPC
  adservice:
    build:
      context: ./src/adservice
      dockerfile: Dockerfile
    container_name: adservice
    ports:
      - "9555:9555"
    networks:
      - microservices-network
    environment:
      - PORT=9555
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9555/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Cart Service - .NET/gRPC
  cartservice:
    build:
      context: ./src/cartservice/src
      dockerfile: Dockerfile
    container_name: cartservice
    ports:
      - "7070:7070"
    networks:
      - microservices-network
    environment:
      - REDIS_ADDR=redis-cart:6379
    depends_on:
      redis-cart:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7070/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Checkout Service - Go/gRPC
  checkoutservice:
    build:
      context: ./src/checkoutservice
      dockerfile: Dockerfile
    container_name: checkoutservice
    ports:
      - "5050:5050"
    networks:
      - microservices-network
    environment:
      - PORT=5050
      - PRODUCT_CATALOG_SERVICE_ADDR=productcatalogservice:3550
      - SHIPPING_SERVICE_ADDR=shippingservice:50051
      - PAYMENT_SERVICE_ADDR=paymentservice:50051
      - EMAIL_SERVICE_ADDR=emailservice:5000
      - CURRENCY_SERVICE_ADDR=currencyservice:7000
      - CART_SERVICE_ADDR=cartservice:7070
    depends_on:
      - productcatalogservice
      - shippingservice
      - paymentservice
      - emailservice
      - currencyservice
      - cartservice

  # Currency Service - Node.js/gRPC
  currencyservice:
    build:
      context: ./src/currencyservice
      dockerfile: Dockerfile
    container_name: currencyservice
    ports:
      - "7000:7000"
    networks:
      - microservices-network
    environment:
      - PORT=7000
      - DISABLE_PROFILER=1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Email Service - Python/gRPC
  emailservice:
    build:
      context: ./src/emailservice
      dockerfile: Dockerfile
    container_name: emailservice
    ports:
      - "5000:8080"
    networks:
      - microservices-network
    environment:
      - PORT=8080
      - DISABLE_PROFILER=1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Frontend - Go/HTTP
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "8080:8080"
    networks:
      - microservices-network
    environment:
      - PORT=8080
      - PRODUCT_CATALOG_SERVICE_ADDR=productcatalogservice:3550
      - CURRENCY_SERVICE_ADDR=currencyservice:7000
      - CART_SERVICE_ADDR=cartservice:7070
      - RECOMMENDATION_SERVICE_ADDR=recommendationservice:8080
      - SHIPPING_SERVICE_ADDR=shippingservice:50051
      - CHECKOUT_SERVICE_ADDR=checkoutservice:5050
      - AD_SERVICE_ADDR=adservice:9555
      - ENABLE_PROFILER=0
    depends_on:
      - productcatalogservice
      - currencyservice
      - cartservice
      - recommendationservice
      - shippingservice
      - checkoutservice
      - adservice

  # Payment Service - Node.js/gRPC
  paymentservice:
    build:
      context: ./src/paymentservice
      dockerfile: Dockerfile
    container_name: paymentservice
    ports:
      - "50051:50051"
    networks:
      - microservices-network
    environment:
      - PORT=50051
      - DISABLE_PROFILER=1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:50051/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Product Catalog Service - Go/gRPC
  productcatalogservice:
    build:
      context: ./src/productcatalogservice
      dockerfile: Dockerfile
    container_name: productcatalogservice
    ports:
      - "3550:3550"
    networks:
      - microservices-network
    environment:
      - PORT=3550
      - DISABLE_PROFILER=1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3550/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Recommendation Service - Python/gRPC
  recommendationservice:
    build:
      context: ./src/recommendationservice
      dockerfile: Dockerfile
    container_name: recommendationservice
    ports:
      - "8081:8080"
    networks:
      - microservices-network
    environment:
      - PORT=8080
      - PRODUCT_CATALOG_SERVICE_ADDR=productcatalogservice:3550
      - DISABLE_PROFILER=1
    depends_on:
      - productcatalogservice
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Shipping Service - Go/gRPC
  shippingservice:
    build:
      context: ./src/shippingservice
      dockerfile: Dockerfile
    container_name: shippingservice
    ports:
      - "50052:50051"
    networks:
      - microservices-network
    environment:
      - PORT=50051
      - DISABLE_PROFILER=1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:50051/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Load Generator - Python/Locust (Optional - for testing)
  loadgenerator:
    build:
      context: ./src/loadgenerator
      dockerfile: Dockerfile
    container_name: loadgenerator
    networks:
      - microservices-network
    environment:
      - FRONTEND_ADDR=frontend:8080
      - USERS=10
    depends_on:
      - frontend
    profiles:
      - loadtest

networks:
  microservices-network:
    driver: bridge
